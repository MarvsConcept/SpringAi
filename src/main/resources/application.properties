spring.application.name=SpringAiCode

spring.ai.openai.api-key = ${SPRING_AI_CODE_OPENAI_API_KEY}

spring.ai.openai.embedding.options.model = text-embedding-ada-002

spring.datasource.url = jdbc:postgresql://localhost:5432/marv
spring.datasource.username = postgres
spring.datasource.password = marvade

spring.jpa.show-sql = true
spring.datasource.driver-class-name=org.postgresql.Driver

spring.main.allow-bean-definition-overriding=true

spring.sql.init.schema-locations=classpath:init/schema.sql
spring.sql.init.mode=always




